# Keeps the Render free backend from sleeping (it spins down after ~15 min idle,
# causing a ~50s cold start on the next request). Pings the health endpoint on a
# schedule so the instance stays warm during and outside active hours.
#
# Note: GitHub's scheduled runs can be delayed under load, so this greatly reduces
# but does not 100% guarantee zero cold starts. For rock-solid timing, also add a
# dedicated monitor (e.g. UptimeRobot, 5-min interval) hitting the same URL.
name: Keep backend warm

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes (UTC)
  workflow_dispatch: {} # allow manual runs from the Actions tab

# If a run is still going when the next fires, skip the new one instead of queueing.
concurrency:
  group: keep-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping API health endpoint
        run: |
          URL="https://api.edubridgenetwork.in/api/v1/health"
          for i in 1 2 3; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 90 "$URL" || echo 000)
            echo "Attempt $i → HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Backend is warm ✅"
              exit 0
            fi
            echo "Not ready (likely cold-starting); retrying in 30s…"
            sleep 30
          done
          echo "::warning::Health check did not return 200 after 3 attempts"
          exit 1
